<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #0B0F19; color: #E2E8F0; overflow: hidden; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; }
    .logo { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(90deg, #818CF8, #C084FC); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; }
    .sub { color: #94A3B8; font-size: 0.85rem; }
    .bar { width: 200px; height: 3px; background: #1E293B; border-radius: 3px; overflow: hidden; }
    .bar::after { content: ""; display: block; height: 100%; width: 40%;
      background: linear-gradient(90deg, #6366F1, #8B5CF6); border-radius: 3px;
      animation: slide 1.1s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">AI Cover Studio</div>
    <div class="bar"></div>
    <div class="sub">Starting local engine…</div>
  </div>
</body>
</html>
