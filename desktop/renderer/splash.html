<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { --v1: #7C6CFF; --v2: #4D9FFF; }
    html, body { margin: 0; height: 100%; overflow: hidden;
      font-family: -apple-system, "SF Pro Display", "Segoe UI", system-ui, sans-serif; }
    body {
      background:
        radial-gradient(120% 90% at 20% 0%, rgba(124,108,255,.35), transparent 60%),
        radial-gradient(120% 90% at 90% 100%, rgba(77,159,255,.30), transparent 55%),
        #141417;
      color: #f1f1f4;
    }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .glyph { display: flex; align-items: flex-end; gap: 3px; height: 34px; }
    .glyph span { width: 4px; border-radius: 3px;
      background: linear-gradient(180deg, var(--v1), var(--v2));
      animation: eq 1s ease-in-out infinite; }
    .glyph span:nth-child(1){ height: 40%; animation-delay: 0s; }
    .glyph span:nth-child(2){ height: 75%; animation-delay: .12s; }
    .glyph span:nth-child(3){ height: 100%; animation-delay: .24s; }
    .glyph span:nth-child(4){ height: 60%; animation-delay: .36s; }
    .glyph span:nth-child(5){ height: 85%; animation-delay: .48s; }
    @keyframes eq { 0%,100% { transform: scaleY(.5); } 50% { transform: scaleY(1); } }
    .logo { font-size: 2.1rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--v1), var(--v2)); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { color: #a8a8b0; font-size: 0.85rem; }
    .bar { width: 220px; height: 3px; background: rgba(255,255,255,.10); border-radius: 3px; overflow: hidden; }
    .bar::after { content: ""; display: block; height: 100%; width: 40%;
      background: linear-gradient(90deg, var(--v1), var(--v2)); border-radius: 3px;
      animation: slide 1.1s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="glyph"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="logo">Vocalis</div>
    </div>
    <div class="bar"></div>
    <div class="sub">Starting local engine…</div>
  </div>
</body>
</html>
