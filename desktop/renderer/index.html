<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vocalis</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ambient mesh-gradient blobs the glass refracts -->
  <div id="ambient" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <!-- draggable native titlebar region -->
  <div id="titlebar" aria-hidden="true"></div>

  <!-- app shell (rendered/managed by app.js) -->
  <div id="app" class="hidden">
    <aside id="sidebar" class="glass"></aside>
    <div id="content"><div id="screen"></div></div>
  </div>

  <!-- auth overlay (shown until signed in / continued as guest) -->
  <div id="auth" class="hidden"></div>

  <!-- floating layer -->
  <div id="toasts"></div>
  <div id="modal-root"></div>

  <script src="app.js"></script>
</body>
</html>
